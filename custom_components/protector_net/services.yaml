# services.yaml for Protector.Net / Hartmann Control

create_temp_code:
  name: Create Temp Code
  description: Create a temporary PIN code for door access. Creates a user in Hartmann with PIN-only credential.
  fields:
    door_device_id:
      name: Door(s)
      description: The door(s) to create the code for
      required: true
      selector:
        device:
          multiple: true
          filter:
            - integration: protector_net
    code_name:
      name: Code Name
      description: A friendly name for this code (e.g., "Guest Room 101", "Airbnb John Smith")
      required: true
      example: "Guest Booking 12345"
      selector:
        text:
    random_code:
      name: Random Code
      description: Generate a random code (if unchecked, you must provide a manual code)
      required: false
      default: true
      selector:
        boolean:
    code_digits:
      name: Code Digits
      description: Number of digits for the random code (4-9). Defaults to the value configured in integration options.
      required: false
      selector:
        number:
          min: 4
          max: 9
          mode: box
    manual_code:
      name: Manual Code
      description: Manually specify the PIN code (only used if Random Code is unchecked)
      required: false
      example: "123456"
      selector:
        text:
    start_time:
      name: Start Time
      description: When the code becomes active (ISO datetime). If not set, code is active immediately.
      required: false
      example: "2026-02-15T14:00:00"
      selector:
        datetime:
    end_time:
      name: End Time
      description: When the code expires (ISO datetime). If not set, code never expires.
      required: false
      example: "2026-02-17T11:00:00"
      selector:
        datetime:

delete_temp_code:
  name: Delete Temp Code
  description: Delete a temporary PIN code from door(s). Removes the user from Hartmann.
  fields:
    door_device_id:
      name: Door(s)
      description: The door(s) to delete the code from
      required: true
      selector:
        device:
          multiple: true
          filter:
            - integration: protector_net
    code:
      name: Code
      description: The PIN code to delete
      required: true
      example: "123456"
      selector:
        text:

delete_temp_code_by_name:
  name: Delete Temp Code by Name
  description: Delete a temporary PIN code by its name (useful for calendar-based automations where you know the booking name but not the code)
  fields:
    door_device_id:
      name: Door(s)
      description: The door(s) to delete the code from
      required: true
      selector:
        device:
          multiple: true
          filter:
            - integration: protector_net
    code_name:
      name: Code Name
      description: The name of the code to delete (must match exactly what was used when creating)
      required: true
      example: "John Smith - Room 101"
      selector:
        text:
    force_remove:
      name: Force Remove
      description: Remove from sensor even if Hartmann deletion fails (useful for cleaning stale entries)
      required: false
      default: false
      selector:
        boolean:

clear_all_temp_codes:
  name: Clear All Temp Codes
  description: Remove all temporary codes from door(s). Attempts to delete from Hartmann and always clears the sensor.
  fields:
    door_device_id:
      name: Door(s)
      description: The door(s) to clear all codes from
      required: true
      selector:
        device:
          multiple: true
          filter:
            - integration: protector_net

update_temp_code:
  name: Update Temp Code
  description: Update the start/end time of an existing temporary code without changing the PIN. Useful for extending guest stays.
  fields:
    door_device_id:
      name: Door(s)
      description: The door(s) the code belongs to
      required: true
      selector:
        device:
          multiple: true
          filter:
            - integration: protector_net
    code_name:
      name: Code Name
      description: The name of the code to update (must match exactly)
      required: true
      selector:
        text:
    start_time:
      name: Start Time
      description: New start time (ISO datetime). Leave empty to keep current.
      required: false
      selector:
        datetime:
    end_time:
      name: End Time
      description: New end time (ISO datetime). Leave empty to keep current.
      required: false
      selector:
        datetime:

update_panels:
  name: Update Panels
  description: Push current configuration to all connected panels. Use after creating/updating temp codes or OTR schedules for immediate effect.

add_door_to_temp_code:
  name: Add Door to Temp Code
  description: Add an additional door to an existing temporary code. The same Hartmann user (and PIN) is assigned to the new door's APG, so the same code unlocks one more door.
  fields:
    door_device_id:
      name: Door(s) to add
      description: The door(s) to grant the existing temp code access to
      required: true
      selector:
        device:
          multiple: true
          filter:
            - integration: protector_net
    code:
      name: Code (PIN)
      description: PIN value of the existing temp code (preferred — uniquely identifies the code)
      required: false
      selector:
        text:
    code_name:
      name: Code Name
      description: Name of the existing temp code (used if Code is not provided)
      required: false
      selector:
        text:

remove_door_from_temp_code:
  name: Remove Door from Temp Code
  description: Remove a door from an existing temporary code. The Hartmann user is left intact — only the user-to-APG link for that door is removed. Other doors keep working with the same PIN.
  fields:
    door_device_id:
      name: Door(s) to remove
      description: The door(s) to remove from the temp code
      required: true
      selector:
        device:
          multiple: true
          filter:
            - integration: protector_net
    code:
      name: Code (PIN)
      description: PIN value of the existing temp code (preferred — uniquely identifies the code)
      required: false
      selector:
        text:
    code_name:
      name: Code Name
      description: Name of the existing temp code (used if Code is not provided)
      required: false
      selector:
        text:

create_otr_schedule:
  name: Create OTR Schedule
  description: Schedule a future door override (unlock, lockdown, etc.) using Hartmann's OneTimeRun feature. The override is stored in the panel and executes even if Home Assistant is offline.
  fields:
    door_device_id:
      name: Door(s)
      description: The door(s) to schedule the override for
      required: true
      selector:
        device:
          multiple: true
          filter:
            - integration: protector_net
    start_time:
      name: Start Time
      description: When the override should start (ISO datetime, e.g. "2026-02-10T09:00:00")
      required: true
      example: "2026-02-10T09:00:00"
      selector:
        datetime:
    stop_time:
      name: Stop Time
      description: When the override should end (ISO datetime, e.g. "2026-02-10T14:00:00")
      required: true
      example: "2026-02-10T14:00:00"
      selector:
        datetime:
    mode:
      name: Mode
      description: Door mode during the scheduled period
      required: false
      default: "Unlock"
      selector:
        select:
          options:
            - "Unlock"
            - "Lockdown"
            - "Card"
            - "Pin"
            - "CardOrPin"
            - "CardAndPin"
            - "UnlockWithFirstCardIn"
            - "DualCard"
    name:
      name: Schedule Name
      description: Optional name for this schedule (auto-generated if not provided)
      required: false
      example: "Morning Unlock"
      selector:
        text:
    description:
      name: Description
      description: Optional description for this schedule
      required: false
      selector:
        text:

delete_otr_schedule:
  name: Delete OTR Schedule
  description: Delete OTR schedules. Pick a door to delete ALL its OTR schedules, or provide a specific schedule ID.
  fields:
    door_device_id:
      name: Door
      description: The door whose OTR schedules should be deleted. If no schedule_id is given, ALL OTR schedules for this door are removed.
      required: false
      selector:
        device:
          multiple: true
          filter:
            - integration: protector_net
    schedule_id:
      name: Schedule ID
      description: Optional specific schedule ID to delete. If omitted, all OTR schedules for the selected door are deleted.
      required: false
      selector:
        number:
          min: 1
          mode: box

get_otr_schedules:
  name: Get OTR Schedules
  description: Get a list of all OTR (One Time Run) schedules
  fields:
    door_device_id:
      name: Door
      description: Optional door to filter results or identify integration instance
      required: false
      selector:
        device:
          multiple: true
          filter:
            - integration: protector_net

override_door:
  name: Override Door
  description: Apply an override to door(s) (unlock, lockdown, etc.). Single service call instead of setting mode + turning on override switch.
  fields:
    door_entity:
      name: Door(s)
      description: The door(s) to override. Pick the door's entity (one per door, named after the door).
      required: false
      selector:
        entity:
          multiple: true
          filter:
            - integration: protector_net
              domain: binary_sensor
              device_class: door
    mode:
      name: Mode
      description: Door mode during override
      required: false
      default: "Unlock"
      selector:
        select:
          options:
            - "Unlock"
            - "Lockdown"
            - "Card"
            - "Pin"
            - "CardOrPin"
            - "CardAndPin"
            - "FirstCredentialIn"
            - "DualCredential"
    override_type:
      name: Override Type
      description: How long the override should last
      required: false
      default: "until_resumed"
      selector:
        select:
          options:
            - label: "Until Resumed"
              value: "until_resumed"
            - label: "For Specified Time"
              value: "for_time"
            - label: "Until Next Schedule"
              value: "until_schedule"
    minutes:
      name: Minutes
      description: Duration in minutes (only used when Override Type is "For Specified Time")
      required: false
      selector:
        number:
          min: 1
          max: 1440
          mode: box
          unit_of_measurement: minutes
    until:
      name: Until
      description: Override until this date/time (auto-computes minutes, sets type to "For Specified Time"). Takes precedence over minutes if both are provided.
      required: false
      example: "2026-02-18T14:00:00"
      selector:
        datetime:
    legacy_options:
      name: Legacy options (for old automations)
      collapsed: false
      fields:
        door_device_id:
          name: Door(s) — Legacy
          description: >-
            ⚠️ Legacy device picker for old automations. Please switch to the
            "Door(s)" entity picker above — device IDs can change after Home
            Assistant core updates, but entity IDs stay stable. To migrate:
            clear this field, then pick the same doors from the entity picker.
          required: false
          selector:
            device:
              multiple: true
              filter:
                - integration: protector_net

resume_door:
  name: Resume Door
  description: Resume normal schedule for door(s) (turn off any active override)
  fields:
    door_entity:
      name: Door(s)
      description: The door(s) to resume. Pick the door's entity (one per door, named after the door).
      required: false
      selector:
        entity:
          multiple: true
          filter:
            - integration: protector_net
              domain: binary_sensor
              device_class: door
    legacy_options:
      name: Legacy options (for old automations)
      collapsed: false
      fields:
        door_device_id:
          name: Door(s) — Legacy
          description: >-
            ⚠️ Legacy device picker for old automations. Please switch to the
            "Door(s)" entity picker above — device IDs can change after Home
            Assistant core updates, but entity IDs stay stable. To migrate:
            clear this field, then pick the same doors from the entity picker.
          required: false
          selector:
            device:
              multiple: true
              filter:
                - integration: protector_net

set_door_schedule_mode:
  name: Set Door Schedule Mode (HA-managed)
  description: >
    Change the schedule mode for HA-managed doors. Unlike override_door, this
    rewrites the door's actual schedule in Hartmann, so the change persists
    across panel reboots. The door must first be added to "Managed doors" via
    integration options.
  fields:
    door_entity:
      name: Door(s)
      description: The door(s) to update. Must be HA-managed. Pick the door's entity (one per door, named after the door).
      required: true
      selector:
        entity:
          multiple: true
          filter:
            - integration: protector_net
              domain: binary_sensor
              device_class: door
    mode:
      name: Mode
      description: >
        Schedule mode for the entire week, 24/7. If the door is currently
        Active (using its HA TZ), an Update Panels is fired automatically.
        If the door is only Provisioned (not yet Active), the new mode is
        staged and takes effect when you activate it via integration options.
      required: true
      selector:
        select:
          options:
            - label: "Lockdown"
              value: "Lockdown"
            - label: "Card Only"
              value: "Card"
            - label: "Pin Only"
              value: "Pin"
            - label: "Card or Pin"
              value: "CardOrPin"
            - label: "Card and Pin"
              value: "CardAndPin"
            - label: "Unlock"
              value: "Unlock"
            - label: "First Credential In"
              value: "UnlockWithFirstCardIn"
            - label: "Dual"
              value: "DualCard"
